# golangci-lint v2 設定
# Docs: https://golangci-lint.run/usage/configuration/

version: "2"

run:
  # 解析全体のタイムアウト
  timeout: 5m
  # build tag が必要なファイルがあればここで指定
  # build-tags: []

linters:
  # デフォルトの linter セットを明示する。
  # "standard" は errcheck / govet / ineffassign / staticcheck / unused を有効化する。
  default: standard

  # 必要に応じて個別に追加・除外する。
  # enable:
  #   - revive
  # disable:
  #   - errcheck

  # linter ごとの細かい挙動はここで上書きする。
  settings:
    errcheck:
      # CLI/TUI 出力系では Fprint 系の戻り値をチェックしてもユーザーに返せる
      # 復旧手段が無いため、プロジェクト方針として除外する。
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf
  #   govet:
  #     enable-all: true
  #   staticcheck:
  #     checks: ["all"]

  # ファイル/ディレクトリ単位で除外したいルールがあればここで定義する。
  # exclusions:
  #   rules:
  #     - path: _test\.go
  #       linters:
  #         - errcheck

# formatter（gofmt / goimports など）は v2 から linter と分離された。
# CI 側で gofmt を別ジョブとして見ているので、ここでは未設定。
# formatters:
#   enable:
#     - gofmt

# 出力フォーマット。CI でサマリ整形したい場合に使う。
# output:
#   formats:
#     text:
#       path: stdout
#       colors: true
